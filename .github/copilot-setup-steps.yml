steps:
  - uses: actions/checkout@v4

  # PHP
  - uses: shivammathur/setup-php@v2
    with:
      php-version: '8.3'
      tools: composer:v2
  - run: composer install --no-interaction --prefer-dist

  # Node.js + npm (for TypeScript work)
  - uses: actions/setup-node@v4
    with:
      node-version: '22'
      cache: npm
  - run: npm ci

  # Bun
  - uses: oven-sh/setup-bun@v2
  - run: bun --version

  # Rust (for tools/ workspace)
  - uses: dtolnay/rust-toolchain@stable
  - run: cargo build --release --manifest-path tools/rust/Cargo.toml
