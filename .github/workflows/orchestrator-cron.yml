name: Orchestrator Cron

on:
  schedule:
    - cron: '0 */4 * * *'
  workflow_dispatch: {}

concurrency:
  group: orchestrator
  cancel-in-progress: false

jobs:
  trigger:
    runs-on: ubuntu-latest
    timeout-minutes: 5
    steps:
      - name: Create orchestrator issue
        run: |
          TIMESTAMP=$(date -u +"%Y-%m-%d %H:%M UTC")
          gh issue create \
            --repo "$GITHUB_REPOSITORY" \
            --title "Orchestrator Cycle - $TIMESTAMP" \
            --label "orchestrator-run" \
            --body "@claude Run your orchestrator cycle. Follow the startup phase in your system prompt."
        env:
          GH_TOKEN: ${{ secrets.ORCHESTRATOR_PAT }}
